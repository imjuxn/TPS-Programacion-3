<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cliente - Food Store</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }

    header {
      background-color: #ff6347;
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    .usuario-info {
      display: flex;
      gap: 15px;
      align-items: center;
      color: white;
      font-size: 14px;
    }

    button {
      background-color: white;
      color: #ff6347;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #f0f0f0;
    }

    .contenedor {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 20px;
    }

    h2 {
      color: #ff6347;
      margin-bottom: 20px;
      font-size: 22px;
    }

    .productos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .producto-card {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .producto-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
    }

    .producto-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .producto-info {
      padding: 15px;
    }

    .producto-info h3 {
      font-size: 16px;
      margin-bottom: 8px;
      color: #333;
    }

    .producto-info p {
      font-size: 13px;
      color: #666;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .precio {
      font-size: 18px;
      font-weight: bold;
      color: #ff6347;
      margin-bottom: 10px;
    }

    .btn-comprar {
      width: 100%;
      padding: 10px;
      background-color: #ff6347;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .btn-comprar:hover {
      background-color: #ff4500;
    }

    footer {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <h1>🍔 Food Store</h1>
    <div class="usuario-info">
      <span>Bienvenido, <strong id="nombre-usuario">Cliente</strong></span>
      <button id="btn-logout">Cerrar Sesión</button>
    </div>
  </header>

  <div class="contenedor">
    <h2>🍽️ Catálogo de Productos</h2>
    <div class="productos" id="contenedor-productos"></div>
  </div>

  <footer>
    <p>© 2024 Food Store - Tu tienda de comida favorita</p>
  </footer>

  <script type="module" src="./client.ts"></script>
</body>
</html>
