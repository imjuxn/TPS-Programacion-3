<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Food Store</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }

    header {
      background-color: #ff6347;
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    .usuario-info {
      display: flex;
      gap: 15px;
      align-items: center;
      color: white;
      font-size: 14px;
    }

    button {
      background-color: white;
      color: #ff6347;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #f0f0f0;
    }

    .contenedor {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 20px;
    }

    h2 {
      color: #ff6347;
      margin-bottom: 20px;
      font-size: 22px;
    }

    .panel {
      background: white;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
    }

    .estadisticas {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .estadistica {
      background: linear-gradient(135deg, #ff6347, #ff4500);
      color: white;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }

    .estadistica h3 {
      font-size: 14px;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .estadistica .numero {
      font-size: 32px;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    table th {
      background-color: #ff6347;
      color: white;
      padding: 12px;
      text-align: left;
    }

    table td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
    }

    table tr:hover {
      background-color: #f9f9f9;
    }

    .rol-admin {
      color: #ff6347;
      font-weight: bold;
    }

    .rol-client {
      color: #28a745;
      font-weight: bold;
    }

    footer {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <h1>🍔 Food Store - Panel Admin</h1>
    <div class="usuario-info">
      <span>Usuario: <strong id="nombre-usuario">Admin</strong></span>
      <button id="btn-logout">Cerrar Sesión</button>
    </div>
  </header>

  <div class="contenedor">
    <h2>Bienvenido al Panel de Administración</h2>

    <div class="panel">
      <h3>📊 Estadísticas</h3>
      <div class="estadisticas">
        <div class="estadistica">
          <h3>Total Usuarios</h3>
          <div class="numero" id="total-usuarios">0</div>
        </div>
        <div class="estadistica">
          <h3>Administradores</h3>
          <div class="numero" id="total-admins">0</div>
        </div>
        <div class="estadistica">
          <h3>Clientes</h3>
          <div class="numero" id="total-clientes">0</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <h3>👥 Usuarios Registrados</h3>
      <table>
        <thead>
          <tr>
            <th>Email</th>
            <th>Nombre</th>
            <th>Rol</th>
          </tr>
        </thead>
        <tbody id="tabla-usuarios">
          <tr>
            <td colspan="3">Cargando usuarios...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <footer>
    <p>© 2024 Food Store - Panel Administrativo</p>
  </footer>

  <script type="module" src="./admin.ts"></script>
</body>
</html>
