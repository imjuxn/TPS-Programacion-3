<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Food Store</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff6347, #ff4500);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .contenedor {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      max-width: 400px;
      width: 90%;
    }

    h1 {
      text-align: center;
      color: #ff6347;
      margin-bottom: 10px;
      font-size: 28px;
    }

    h2 {
      text-align: center;
      color: #666;
      font-size: 20px;
      margin-bottom: 25px;
      font-weight: normal;
    }

    .info-prueba {
      background-color: #e7f3ff;
      border: 1px solid #b3d9ff;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 12px;
      color: #004085;
    }

    .info-prueba strong {
      display: block;
      margin-bottom: 6px;
    }

    .info-prueba p {
      margin: 3px 0;
      line-height: 1.4;
    }

    .mensaje {
      margin-bottom: 15px;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      display: none;
    }

    .mensaje.exito {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .mensaje.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .campo {
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 5px;
      color: #333;
      font-weight: bold;
      font-size: 14px;
    }

    input {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #ff6347;
      box-shadow: 0 0 5px rgba(255, 99, 71, 0.3);
    }

    button[type="submit"] {
      padding: 12px;
      background-color: #ff6347;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button[type="submit"]:hover {
      background-color: #ff4500;
    }

    .enlaces {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-top: 15px;
    }

    .enlaces a, .enlaces span {
      color: #ff6347;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
    }

    .enlaces a:hover, .enlaces span:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <h1>🍔 Food Store</h1>
    <h2>Iniciar Sesión</h2>

    <div class="info-prueba">
      <strong>Datos de prueba:</strong>
      <p><strong>Admin:</strong> admin@foodstore.com / admin123</p>
      <p><strong>Cliente:</strong> cliente@foodstore.com / cliente123</p>
    </div>

    <div id="mensaje" class="mensaje"></div>

    <form id="formulario-login">
      <div class="campo">
        <label for="email">Correo Electrónico</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="ejemplo@correo.com"
          required
        />
      </div>

      <div class="campo">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Tu contraseña"
          required
        />
      </div>

      <button type="submit">Ingresar</button>
    </form>

    <div class="enlaces">
      <p>¿No tenés cuenta? <span id="enlace-registro">Registrate</span></p>
      <p><span id="enlace-home">← Volver al inicio</span></p>
    </div>
  </div>

  <script type="module" src="./login.ts"></script>
</body>
</html>
